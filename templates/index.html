<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ESP32 IoT Dashboard</title><style>body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1e293b 0%%, #0f172a 100%%); color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; box-sizing: border-box; } .container { width: 100%%; max-width: 420px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 35px 25px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; } h1 { font-size: 24px; font-weight: 700; margin: 0 0 10px 0; letter-spacing: -0.5px; } p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 30px; } .status-card { background: rgba(15, 23, 42, 0.6); padding: 16px; border-radius: 16px; font-size: 15px; font-weight: 600; color: #94a3b8; margin-bottom: 35px; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: center; gap: 10px; } .indicator { width: 12px; height: 12px; border-radius: 50%%; background: #64748b; transition: all 0.4s ease; box-shadow: 0 0 0 rgba(0,0,0,0); } .panel-on { color: #38bdf8; } .panel-on .indicator { background: #38bdf8; box-shadow: 0 0 12px #38bdf8; } .panel-off { color: #ef4444; } .panel-off .indicator { background: #ef4444; box-shadow: 0 0 12px #ef4444; } .panel-blink { color: #fbbf24; } .panel-blink .indicator { background: #fbbf24; box-shadow: 0 0 12px #fbbf24; animation: pulse 1s infinite alternate; } @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } } .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; } button { font-size: 15px; font-weight: 600; padding: 16px; border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s ease; color: #ffffff; } button:active { transform: scale(0.97); } .btn-on { background: #0284c7; } .btn-on:hover { background: #0369a1; } .btn-off { background: #dc2626; } .btn-off:hover { background: #b91c1c; } .btn-blink { background: #d97706; } .btn-blink:hover { background: #b45309; } .btn-stop { background: #475569; } .btn-stop:hover { background: #334155; }</style></head><body><div class="container"><h1>Smart LED Control</h1><p class="subtitle">ESP32 Real-Time Controller</p><div id="statusPanel" class="status-card panel-off"><div class="indicator"></div><span id="statusText">LED STATUS: OFF</span></div><div class="grid"><button class="btn-on" onclick="sendCmd('on')">Light LED</button><button class="btn-off" onclick="sendCmd('off')">Stop Light</button></div><div class="grid"><button class="btn-blink" onclick="sendCmd('blink')">Blink LED</button><button class="btn-stop" onclick="sendCmd('stop-blink')">Stop Blink</button></div></div><script>function updateUI(state){const panel = document.getElementById('statusPanel'); const text = document.getElementById('statusText'); panel.className = 'status-card'; text.innerText = 'LED STATUS: ' + state.toUpperCase(); if(state === 'on'){ panel.classList.add('panel-on'); } else if(state === 'blink'){ panel.classList.add('panel-blink'); } else { panel.classList.add('panel-off'); text.innerText = 'LED STATUS: OFF'; }} function sendCmd(state){fetch('/api/led',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({state:state})}).then(res=>res.json()).then(data=>updateUI(data.state));} setInterval(()=>{fetch('/api/led').then(res=>res.json()).then(data=>updateUI(data.state));},2000);</script></body></html>
